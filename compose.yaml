services:
  db:
    image: postgres:17-alpine
    container_name: athena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: athena
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - athena-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d athena"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  athena-postgres-data:
